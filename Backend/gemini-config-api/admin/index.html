<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Hub - Admin Control</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #accent;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #1e293b;
            letter-spacing: -0.01em;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sidebar-active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white !important;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .bento-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .bento-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, var(--primary), #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            /* Fix compatibility */
            -webkit-text-fill-color: transparent;
        }

        input,
        textarea {
            outline: none;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        /* SKELETON SCREEN */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-row {
            height: 60px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
        }

        .pulse-live {
            position: relative;
            display: inline-flex;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color, #10b981);
        }

        .pulse-live::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--color, #10b981);
            animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(3.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <!-- IMMEDIATE RENDER SKELETON -->
        <div class="flex h-screen bg-[#f1f5f9]">
            <aside class="w-72 glass border-r p-8 space-y-8">
                <div class="h-10 w-40 skeleton"></div>
                <div class="space-y-4">
                    <div class="h-14 w-full skeleton"></div>
                    <div class="h-14 w-full skeleton"></div>
                </div>
            </aside>
            <main class="flex-1 p-12 space-y-12">
                <div class="flex justify-between items-end">
                    <div class="space-y-3">
                        <div class="h-10 w-48 skeleton"></div>
                        <div class="h-4 w-64 skeleton"></div>
                    </div>
                    <div class="h-12 w-40 skeleton"></div>
                </div>
                <div class="bento-card p-10 space-y-6">
                    <div class="skeleton-row">
                        <div class="flex-1 skeleton"></div>
                        <div class="flex-1 skeleton"></div>
                        <div class="w-20 skeleton"></div>
                    </div>
                    <div class="skeleton-row">
                        <div class="flex-1 skeleton"></div>
                        <div class="flex-1 skeleton"></div>
                        <div class="w-20 skeleton"></div>
                    </div>
                    <div class="skeleton-row">
                        <div class="flex-1 skeleton"></div>
                        <div class="flex-1 skeleton"></div>
                        <div class="w-20 skeleton"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="text/babel">
        const API_BASE = '/api/admin';

        function App() {
            const [view, setView] = React.useState('users');
            const [isLoggedIn, setIsLoggedIn] = React.useState(localStorage.getItem('adminToken') === 'true');

            if (!isLoggedIn) return <LoginView onLogin={() => setIsLoggedIn(true)} />;

            const logout = () => {
                localStorage.removeItem('adminToken');
                setIsLoggedIn(false);
            };

            return (
                <div className="flex h-screen overflow-hidden bg-[#f1f5f9]">
                    <aside className="w-72 glass border-r border-slate-200 flex flex-col z-20">
                        <div className="p-8">
                            <h1 className="text-2xl font-extrabold tracking-tight flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">O</div>
                                <span className="gradient-text">Onpoint Hub</span>
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            <button onClick={() => setView('users')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-sm font-bold transition-all ${view === 'users' ? 'sidebar-active' : 'text-slate-500 hover:bg-white hover:text-slate-900'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4z" /></svg>
                                Nhân viên
                            </button>
                            <button onClick={() => setView('settings')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-sm font-bold transition-all ${view === 'settings' ? 'sidebar-active' : 'text-slate-500 hover:bg-white hover:text-slate-900'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                Cấu hình
                            </button>
                        </nav>
                        <div className="p-4 space-y-2 border-t border-slate-100 mt-auto">
                            <div className="px-4 py-3 text-xs font-bold text-slate-400 flex items-center gap-3">
                                <div className="pulse-live"></div>
                                <span className="text-slate-900">Live Realtime</span>
                            </div>
                            <button onClick={logout} className="w-full flex items-center gap-4 px-6 py-3 rounded-xl text-xs font-bold text-red-400 hover:bg-red-50 transition-all">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                Đăng xuất
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-12">
                        <div className="max-w-6xl mx-auto">
                            {view === 'users' ? <UserManagement /> : <SettingsEditor />}
                        </div>
                    </main>
                </div>
            );
        }

        function LoginView({ onLogin }) {
            const [pass, setPass] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pass })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('adminToken', 'true');
                        onLogin();
                    } else {
                        setError(data.error);
                    }
                } catch (e) {
                    setError('Lỗi kết nối server');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="h-screen w-full flex items-center justify-center bg-[#f1f5f9]">
                    <div className="bento-card p-12 w-full max-w-md space-y-8 shadow-2xl">
                        <div className="text-center space-y-2">
                            <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-xl mx-auto mb-6">O</div>
                            <h2 className="text-3xl font-black text-slate-900">Admin Control</h2>
                            <p className="text-slate-500 font-medium">Nhập mật khẩu quản trị để tiếp tục</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-2">
                                <input
                                    type="password"
                                    className="w-full px-6 py-4 rounded-2xl bg-slate-50"
                                    placeholder="Mật khẩu Admin"
                                    value={pass}
                                    onChange={e => setPass(e.target.value)}
                                    autoFocus
                                />
                                {error && <p className="text-red-500 text-xs font-bold pl-2">⚠️ {error}</p>}
                            </div>
                            <button
                                disabled={loading}
                                className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-indigo-600 transition-all shadow-xl disabled:bg-slate-300"
                            >
                                {loading ? 'Đang xác thực...' : 'Đăng nhập'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function UserManagement() {
            const [users, setUsers] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [showAdd, setShowAdd] = React.useState(false);
            const [newUser, setNewUser] = React.useState({ username: '', password: '' });
            const [searchTerm, setSearchTerm] = React.useState('');

            const fetchUsers = async (isBackground = false) => {
                if (!isBackground) setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/users`);
                    const data = await res.json();
                    setUsers(Array.isArray(data) ? data : []);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchUsers(); // Lần đầu hiện loading

                // Cơ chế Realtime: Polling mỗi 5 giây
                const interval = setInterval(() => {
                    fetchUsers(true); // Auto-refresh im lặng
                }, 5000);

                return () => clearInterval(interval);
            }, []);

            const isUserOnline = (lastActiveAt) => {
                if (!lastActiveAt) return false;
                return (Date.now() - new Date(lastActiveAt).getTime()) < 120000; // 2 phút là Offline
            };

            const toggleStatus = async (id, currentStatus) => {
                await fetch(`${API_BASE}/users`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, isActive: !currentStatus }) });
                fetchUsers(true);
            };

            const deleteUser = async (id) => {
                if (!confirm("Xóa nhân viên này?")) return;
                await fetch(`${API_BASE}/users?id=${id}`, { method: 'DELETE' });
                fetchUsers(true);
            };

            const addUser = async (e) => {
                e.preventDefault();
                const res = await fetch(`${API_BASE}/users`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newUser) });
                if (res.ok) { setShowAdd(false); setNewUser({ username: '', password: '' }); fetchUsers(true); }
            };

            // SEARCH & ANALYTICS LOGIC
            const filteredUsers = users.filter(u => u.username?.toLowerCase().includes(searchTerm.toLowerCase()));
            const stats = {
                total: users.length,
                online: users.filter(u => isUserOnline(u.lastActiveAt)).length,
                setup: users.filter(u => !u.isUninstalled).length,
                setupRate: users.length ? Math.round((users.filter(u => !u.isUninstalled).length / users.length) * 100) : 0
            };

            const formatDate = (date) => {
                if (!date) return '---';
                const d = new Date(date);
                return d.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
            };

            const timeAgo = (date) => {
                if (!date) return '---';
                const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                if (seconds < 60) return 'Vừa xong';
                const minutes = Math.floor(seconds / 60);
                if (minutes < 60) return `${minutes} phút trước`;
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return `${hours} giờ trước`;
                return formatDate(date);
            };

            return (
                <div className="space-y-8">
                    {/* STATS BENTO CARDS */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bento-card p-8 flex flex-col justify-between border-l-4 border-l-indigo-500">
                            <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Tổng nhân viên</span>
                            <div className="flex items-end gap-3 mt-4">
                                <span className="text-5xl font-black text-slate-900">{stats.total}</span>
                                <span className="text-slate-400 font-bold mb-1">tài khoản</span>
                            </div>
                        </div>
                        <div className="bento-card p-8 flex flex-col justify-between border-l-4 border-l-green-500">
                            <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Đang Online</span>
                            <div className="flex items-end gap-3 mt-4">
                                <span className="text-5xl font-black text-green-600">{stats.online}</span>
                                <span className="text-slate-400 font-bold mb-1">kết nối live</span>
                            </div>
                        </div>
                        <div className="bento-card p-8 flex flex-col justify-between border-l-4 border-l-purple-500">
                            <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Tỷ lệ cài đặt</span>
                            <div className="flex items-end gap-3 mt-4">
                                <span className="text-5xl font-black text-purple-600">{stats.setupRate}%</span>
                                <span className="text-slate-400 font-bold mb-1">({stats.setup}/{stats.total})</span>
                            </div>
                        </div>
                    </div>

                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                        <div className="flex-1 w-full">
                            <h2 className="text-4xl font-black text-slate-900">Nhân viên</h2>
                            <div className="relative mt-4 w-full max-w-md">
                                <input
                                    className="w-full pl-12 pr-6 py-4 rounded-2xl bg-white border-slate-200 shadow-sm"
                                    placeholder="Tìm kiếm nhân viên..."
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                                <svg className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            </div>
                        </div>
                        <button onClick={() => setShowAdd(!showAdd)} className="px-8 py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-indigo-600 transition-all shadow-lg whitespace-nowrap">
                            {showAdd ? 'Hủy bỏ' : 'Thêm nhân viên mới'}
                        </button>
                    </header>

                    {showAdd && (
                        <div className="bento-card p-8 bg-indigo-50 border-indigo-100">
                            <form onSubmit={addUser} className="flex gap-4">
                                <input className="flex-1 px-6 py-3 rounded-xl" placeholder="Username" value={newUser.username} onChange={e => setNewUser({ ...newUser, username: e.target.value })} required />
                                <input className="flex-1 px-6 py-3 rounded-xl" type="password" placeholder="Password" value={newUser.password} onChange={e => setNewUser({ ...newUser, password: e.target.value })} required />
                                <button className="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl">Tạo ngay</button>
                            </form>
                        </div>
                    )}

                    <div className="bento-card overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b">
                                <tr>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase">Nhân viên</th>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase">Version</th>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase">Kết nối</th>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase text-center">Extension</th>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase text-center">Trạng thái</th>
                                    <th className="px-6 py-5 text-xs font-bold text-slate-400 uppercase text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {loading ? <tr><td colSpan="6" className="p-10 text-center text-slate-400 font-bold italic">BẢNG ĐANG CẬP NHẬT...</td></tr> : filteredUsers.map(user => (
                                    <tr key={user._id} className="hover:bg-slate-50 transition-colors">
                                        <td className="px-6 py-5">
                                            <div className="font-bold text-slate-900">{user.username}</div>
                                            <div className="text-[10px] text-slate-400 font-mono mt-1">ID: {user._id.slice(-6).toUpperCase()}</div>
                                        </td>
                                        <td className="px-6 py-5">
                                            <span className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold font-mono border border-indigo-100">
                                                v{user.extVersion || "N/A"}
                                            </span>
                                        </td>
                                        <td className="px-6 py-5">
                                            <div className="flex items-center gap-2">
                                                <div className={`pulse-live ${isUserOnline(user.lastActiveAt) ? '' : 'opacity-20 grayscale border-slate-400'}`} style={{ '--color': isUserOnline(user.lastActiveAt) ? '#10b981' : '#94a3b8' }}></div>
                                                <span className={`text-sm font-bold ${isUserOnline(user.lastActiveAt) ? 'text-green-600' : 'text-slate-400'}`}>
                                                    {isUserOnline(user.lastActiveAt) ? 'Online' : 'Offline'}
                                                </span>
                                            </div>
                                            <div className="mt-1.5 flex flex-col gap-0.5">
                                                <div className="text-[11px] text-slate-500 flex items-center gap-1">
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" strokeWidth="2" /></svg>
                                                    {user.lastIp || 'Chưa có IP'}
                                                </div>
                                                <div className="text-[11px] text-slate-400 italic">Ping: {timeAgo(user.lastActiveAt)}</div>
                                            </div>
                                        </td>
                                        <td className="px-6 py-5 text-center">
                                            <span className={`status-pill ${user.isUninstalled ? 'status-inactive' : 'status-active'}`}>
                                                {user.isUninstalled ? 'ĐÃ GỠ' : 'ĐANG CÀI'}
                                            </span>
                                            <div className="mt-2 text-[10px] text-slate-400 font-medium">
                                                {user.isUninstalled
                                                    ? `Gỡ: ${formatDate(user.uninstalledAt)}`
                                                    : `Cài: ${formatDate(user.lastInstalledAt || user.createdAt)}`
                                                }
                                            </div>
                                        </td>
                                        <td className="px-6 py-5 text-center">
                                            <span className={`status-pill ${user.isActive ? 'status-active' : 'status-inactive'}`}>{user.isActive ? 'BẬT' : 'KHÓA'}</span>
                                        </td>
                                        <td className="px-6 py-5 text-right space-x-2">
                                            <button onClick={() => toggleStatus(user._id, user.isActive)} className="p-2.5 rounded-xl hover:bg-white border border-transparent hover:border-slate-200 transition-all shadow-sm" title={user.isActive ? 'Khóa tài khoản' : 'Mở tài khoản'}>
                                                {user.isActive ? '🔒' : '🔓'}
                                            </button>
                                            <button onClick={() => deleteUser(user._id)} className="p-2.5 rounded-xl hover:bg-red-50 text-red-400 transition-all" title="Xóa vĩnh viễn">🗑️</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function SettingsEditor() {
            const [data, setData] = React.useState(null);
            const [saving, setSaving] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('brands');
            const [buffers, setBuffers] = React.useState({ allBrands: '', allMarketplaces: '', brandGroups: '', forbiddenRules: '', typoDictionary: '' });

            React.useEffect(() => {
                fetch(`${API_BASE}/settings`).then(r => r.json()).then(d => {
                    setData(d);
                    setBuffers({
                        allBrands: (d.allBrands || []).join('\n'),
                        allMarketplaces: (d.allMarketplaces || []).join('\n'),
                        brandGroups: (d.brandGroups || []).map(g => Array.isArray(g) ? g.join(', ') : g).join('\n'),
                        forbiddenRules: (d.forbiddenRules?.VI || []).map(r => r.word + (r.exception ? ` | ${r.exception}` : '')).join('\n'),
                        typoDictionary: (d.typoDictionary || []).map(r => `${r.error} | ${r.fix}`).join('\n')
                    });
                });
            }, []);

            const handleSave = async () => {
                setSaving(true);
                const updatedData = { ...data };
                updatedData.allBrands = buffers.allBrands.split('\n').map(x => x.trim()).filter(Boolean);
                updatedData.allMarketplaces = buffers.allMarketplaces.split('\n').map(x => x.trim()).filter(Boolean);
                updatedData.brandGroups = buffers.brandGroups.split('\n').map(line => line.split(',').map(item => item.trim()).filter(Boolean)).filter(group => group.length > 0);
                updatedData.forbiddenRules = { VI: buffers.forbiddenRules.split('\n').map(l => { const [w, ex] = l.split('|'); return { word: w?.trim(), exception: ex?.trim() }; }).filter(r => r.word) };
                updatedData.typoDictionary = buffers.typoDictionary.split('\n').map(l => { const [err, fix] = l.split('|'); return { error: err?.trim(), fix: fix?.trim() }; }).filter(r => r.error && r.fix);

                const res = await fetch(`${API_BASE}/settings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedData) });
                if (res.ok) alert("Đã lưu!");
                setSaving(false);
            };

            if (!data) return <div className="p-20 text-center font-bold">LOADING...</div>;

            return (
                <div className="space-y-8">
                    <header className="flex justify-between items-end">
                        <div>
                            <h2 className="text-4xl font-black text-slate-900">Cấu hình</h2>
                            <p className="text-slate-500 font-medium">Thiết lập bộ lọc toàn hệ thống</p>
                        </div>
                        <button onClick={handleSave} disabled={saving} className="px-10 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-xl hover:bg-indigo-700 transition-all disabled:bg-slate-300">
                            {saving ? 'Đang lưu...' : 'Lưu tất cả'}
                        </button>
                    </header>

                    <div className="bg-white p-1.5 rounded-2xl flex gap-1 w-fit shadow-sm border">
                        {['brands', 'groups', 'forbidden', 'typo', 'update'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`px-8 py-3 rounded-xl text-xs font-bold transition-all ${activeTab === t ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>{t.toUpperCase()}</button>
                        ))}
                    </div>

                    <div className="bento-card p-10 min-h-[500px]">
                        {activeTab === 'update' && (
                            <div className="space-y-10 max-w-2xl">
                                <div className="space-y-4">
                                    <h3 className="text-xl font-bold flex items-center gap-2">
                                        <svg className="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                        Bắt buộc Cập nhật (Force Update)
                                    </h3>
                                    <p className="text-sm text-slate-500">Giúp bạn ép toàn bộ nhân viên phải nâng cấp Extension lên bản mới nhất để tiếp tục làm việc.</p>
                                </div>

                                <div className="grid grid-cols-1 gap-8">
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest">Phiên bản tối thiểu yêu cầu</label>
                                        <input
                                            type="text"
                                            className="w-full px-6 py-4 rounded-2xl bg-slate-50 border font-mono"
                                            value={data.minVersion || ''}
                                            onChange={e => setData({ ...data, minVersion: e.target.value })}
                                            placeholder="Ví dụ: 4.2"
                                        />
                                        <p className="text-[10px] text-slate-400">Nếu nhân viên dùng bản thấp hơn số này, Extension sẽ bị khóa và yêu cầu cập nhật.</p>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest">Link tải Extension mới (.zip)</label>
                                        <input
                                            type="text"
                                            className="w-full px-6 py-4 rounded-2xl bg-slate-50 border font-mono"
                                            value={data.downloadUrl || ''}
                                            onChange={e => setData({ ...data, downloadUrl: e.target.value })}
                                            placeholder="https://..."
                                        />
                                        <p className="text-[10px] text-slate-400">Dán link Drive hoặc host file .zip chứa extension đã giải nén.</p>
                                    </div>
                                </div>

                                <div className="p-6 bg-amber-50 border border-amber-100 rounded-2xl space-y-2">
                                    <h4 className="text-sm font-bold text-amber-900 flex items-center gap-2">
                                        <span>⚠️</span> Lưu ý khi cập nhật
                                    </h4>
                                    <ul className="text-xs text-amber-800 space-y-1 list-disc pl-4">
                                        <li>Đảm bảo link tải luôn hoạt động.</li>
                                        <li>Nhân viên sẽ thấy hướng dẫn "Load Unpacked" ngay trong Extension.</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                        {activeTab === 'typo' && (
                            <div className="space-y-4">
                                <h3 className="text-xl font-bold">Từ điển Typo Local <span className="text-xs font-normal text-slate-400">(Tiết kiệm chi phí AI)</span></h3>
                                <p className="text-sm text-slate-500">Định dạng: <code>từ lỗi | từ đúng</code>. Mỗi dòng một cặp. Ví dụ: <code>đượcj | được</code></p>
                                <textarea className="w-full h-[400px] bg-slate-50 border rounded-2xl p-8 font-mono text-sm" value={buffers.typoDictionary} onChange={e => setBuffers({ ...buffers, typoDictionary: e.target.value })} placeholder="đượcj | được&#10;trao đổi f | trao đổi" />
                            </div>
                        )}
                        {activeTab === 'groups' && (
                            <div className="space-y-4">
                                <h3 className="text-xl font-bold">Nhóm Brand liên quan</h3>
                                <textarea className="w-full h-[400px] bg-slate-50 border rounded-2xl p-8 font-mono text-sm" value={buffers.brandGroups} onChange={e => setBuffers({ ...buffers, brandGroups: e.target.value })} />
                            </div>
                        )}
                        {activeTab === 'brands' && (
                            <div className="grid grid-cols-2 gap-10">
                                <div className="space-y-4">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">Danh sách Brands</label>
                                    <textarea className="w-full h-[400px] bg-slate-50 border rounded-2xl p-6 font-mono text-sm" value={buffers.allBrands} onChange={e => setBuffers({ ...buffers, allBrands: e.target.value })} />
                                </div>
                                <div className="space-y-4">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">Danh sách Sàn</label>
                                    <textarea className="w-full h-[400px] bg-slate-50 border rounded-2xl p-6 font-mono text-sm" value={buffers.allMarketplaces} onChange={e => setBuffers({ ...buffers, allMarketplaces: e.target.value })} />
                                </div>
                            </div>
                        )}
                        {activeTab === 'forbidden' && (
                            <div className="space-y-4">
                                <h3 className="text-xl font-bold">Từ cấm & Ngoại lệ</h3>
                                <textarea className="w-full h-[400px] bg-slate-50 border rounded-2xl p-8 font-mono text-sm" value={buffers.forbiddenRules} onChange={e => setBuffers({ ...buffers, forbiddenRules: e.target.value })} />
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
