<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Chất lượng CS - Gemini V4.1</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            /* Changed from 40px */
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles (Simplified from index.html) */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            z-index: 20;
        }

        /* Hide sidebar in Extension mode */
        body.is-extension .sidebar {
            display: none !important;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-decoration: none;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: #4f46e5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 20px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #fff;
            color: #0f172a;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .logout-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 12px 20px;
            color: #f87171;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Content Adjustments */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        body.is-extension .main-content {
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #64748b;
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card .val {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
        }

        .table-container {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-apply {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-bypass {
            background: #fee2e2;
            color: #b91c1c;
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: #94a3b8;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--card);
            padding: 20px 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            align-items: flex-end;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: var(--primary);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">
            <div class="logo-box">O</div>
            <span class="logo-text">Onpoint Hub</span>
        </a>
        <nav class="nav-items">
            <a href="index.html" class="nav-link">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4z" />
                </svg>
                Nhân viên
            </a>
            <a href="index.html" class="nav-link">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Cấu hình
            </a>
            <a href="report.html" class="nav-link active">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Báo cáo chất lượng
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-badge">
                <div class="dot"></div>
                Live Realtime
            </div>
            <button class="logout-btn" id="btnLogout">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Đăng xuất
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            <header>
                <div>
                    <h1 id="report-title">Báo cáo Chất lượng CS</h1>
                    <p id="report-subtitle" style="color: #64748b; margin-top: 5px;">Theo dõi và phân tích hiệu suất tư
                        vấn
                        của đội ngũ.</p>
                </div>
                <button id="btnRefresh" class="refresh-btn">Làm mới dữ liệu</button>
            </header>

            <!-- Keep existing filter-row, stats-grid, table-container ... -->
            <div class="filter-row">
                <div class="filter-group">
                    <label>Từ ngày</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>Đến ngày</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label>Hành động</label>
                    <select id="actionFilter">
                        <option value="all">Tất cả hành động</option>
                        <option value="apply_fix">Sửa lỗi</option>
                        <option value="bypass_block">Lỗi được bỏ qua</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 250px;">
                    <label>Tìm kiếm nhanh</label>
                    <input type="text" id="keywordSearch" placeholder="Tìm theo Brand, Sàn, ID khách hoặc Nội dung...">
                </div>
                <div class="filter-group">
                    <button class="refresh-btn" id="btnApplyFilters"
                        style="background:#1e293b; padding: 10px 20px; font-size: 13px;">Lọc báo cáo</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Tổng hành vi</h3>
                    <div class="val" id="total-actions">0</div>
                </div>
                <div class="stat-card" style="border-bottom: 4px solid #10b981;">
                    <h3>Lỗi đã sửa</h3>
                    <div class="val" id="fixes">0</div>
                </div>
                <div class="stat-card" style="border-bottom: 4px solid #ef4444;">
                    <h3>Lỗi được bỏ qua</h3>
                    <div class="val" id="bypasses">0</div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Thời gian</th>
                            <th>Nhân viên</th>
                            <th>Brand / Sàn</th>
                            <th>Hành động</th>
                            <th>Chi tiết</th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
                <div id="empty-msg" class="empty-state" style="display: none;">
                    Chưa có dữ liệu báo cáo nào được ghi nhận.
                </div>
            </div>
        </div>
    </main>

    <script src="admin_report.js"></script>
</body>

</html>
